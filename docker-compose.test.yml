services:
  backend_test:
    build:
      context: ./backend
      dockerfile: Dockerfile.test
    command: pytest
    ports:
      - "5001:5001"
    environment:
      - FLASK_DEBUG=1
      - DATABASE_URL=postgresql://test:test@db_test:5432/db_test
      - REDIS_URL=redis://redis_test:6379
      - REDIS_CACHE_TIMEOUT=300
    depends_on:
      - redis_test

  redis_test:
    image: redis:alpine
    depends_on:
      db_test:
        condition: service_healthy

  db_test:
    build: ./database
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=db_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d db_test -U test"]
      interval: 5s
      timeout: 5s
      retries: 5