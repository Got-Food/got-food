services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  backend:
    build: ./backend
    environment:
      - DATABASE_URL=postgresql://dev_user:dev_password@db:5432/gotfood_dev_database
      - REDIS_URL=redis://redis:6379
      - REDIS_CACHE_TIMEOUT=300
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/server
    depends_on:
      - redis

  redis:
    image: redis:alpine
    depends_on:
      - db

  db:
    build: ./database
    environment:
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev_password
      - POSTGRES_DB=gotfood_dev_database
